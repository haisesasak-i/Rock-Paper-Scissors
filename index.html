<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <script src="./RockPaperScissors.js" defer></script>
    <link rel="stylesheet" href="./styleSheet.css">
</head>

<body>
    <div class="header">
        <p class="mainHeading">ROCK PAPER SCISSORS</p>
        <P class="subHeading">Click your choice to play</P>

    </div>
    <div class="mainContent flex">
        <div class="buttonSection sectionStyle flex">
            <p class="sectionMain ">CHOOSE YOUR MOVE</p>
            <div class="buttonsContainer">

                <button class="rock"><img src="./images/game-rock.png"
                        alt="A detailed low-poly gray rock icon with angular facets, soft highlights, and subtle shadows, isolated on a transparent background in a modern 2D game-style illustration."><span
                        class="text">Rock</span></button>
                <button class="paper"><img src="./images/game-paper.png"
                        alt="White paper document icon with a folded corner on a transparent background."><span
                        class="text">Paper</span></button>
                <button class="scissors"><img src="./images/game-scissors.png"
                        alt="Red-handled scissors icon with silver blades on a transparent background."><span
                        class="text">Scissors</span></button>


            </div>


        </div>
       


    </div>

</body>

</html>
