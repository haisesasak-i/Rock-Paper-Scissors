<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
    <script src="./RockPaperScissors.js" defer></script>
    <link rel="stylesheet" href="./styleSheet.css">
</head>

<body class="flex">
    <div class="header">
        <p class="mainHeading">ROCK PAPER SCISSORS</p>
        <P class="subHeading">Click your choice to play</P>

    </div>
    <div class="mainContent flex">
        <div class="buttonSection sectionStyle flex">
            <p class="sectionMain ">CHOOSE YOUR MOVE</p>
            <div class="buttonsContainer flex">

                <button class="rock"><img src="./images/game-rock.png"
                        alt="A detailed low-poly gray rock icon with angular facets, soft highlights, and subtle shadows, isolated on a transparent background in a modern 2D game-style illustration."><span
                        class="text">Rock</span></button>
                <button class="paper"><img src="./images/game-paper.png"
                        alt="White paper document icon with a folded corner on a transparent background."><span
                        class="text">Paper</span></button>
                <button class="scissors"><img src="./images/game-scissors.png"
                        alt="Red-handled scissors icon with silver blades on a transparent background."><span
                        class="text">Scissors</span></button>


            </div>


        </div>
        <div class="scoreSection flex sectionStyle ">
            <p class="sectionMain ">Score</p>
            <div class="scoreBoard flex">
                <div class="player">
                    <p class="scoreText">You</p>
                    <p class="playerCurrent">0</p>
                </div>
                <div class="round">
                    <p class="scoreText">Round</p>
                    <p class="roundNumber">0</p>
                </div>
                <div class="opponent">
                    <p class="scoreText">Computer</p>
                    <p class="computerCurrent ">0</p>
                </div>
            </div>

        </div>
        <div class="resultSection flex sectionStyle">
            <p class="sectionMain ">Result</p>
            <div class="stats">
                <p class="computer">Computer chose <span class="computerChoice">-</span></p>
                <p class="user">You chose <span class="userChoice">-</span></p>
                <p class="result"></p>

            </div>

        </div>



    </div>
    <div class="footer">
        <p class="footerText">First Player to reach 5 points wins!</p>
    </div>

</body>

</html>
